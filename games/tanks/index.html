<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Tank Battle — NEXUS</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/game.css">
  <style>:root{--grad:linear-gradient(135deg,#f59e0b,#ef4444);--bord:rgba(245,158,11,.2);--accent:#f59e0b;}
  #gameCanvas{cursor:crosshair;}</style>
</head>
<body>
<div id="loading-screen"><div class="load-logo">NEXUS</div><div class="load-title">🪖 TANK BATTLE</div><div class="load-bar-wrap"><div class="load-bar" id="load-bar"></div></div><div class="load-hint">Deploying armor...</div></div>
<div class="top-bar">
  <a href="../../index.html" class="back-btn">← Back to NEXUS</a>
  <div class="game-title-bar"><span class="game-emoji-sm">🪖</span><span class="game-name">TANK BATTLE</span></div>
  <div class="ctrl-btns"><button class="ctrl-btn" id="pauseBtn">⏸ Pause</button><button class="ctrl-btn" id="restartBtn">↺ Restart</button></div>
</div>
<div class="hud">
  <div class="hud-item">🏆 Score <span class="hud-val" id="scoreDisplay">0</span></div>
  <div class="hud-item">❤️ HP <span class="hud-val" id="hpDisplay">3</span></div>
  <div class="hud-item">🌊 Wave <span class="hud-val" id="waveDisplay">1</span></div>
  <div class="hud-item" style="margin-left:auto">Best <span class="hud-val" id="bestDisplay">0</span></div>
</div>
<div class="game-area" style="background:#050508;">
  <canvas id="gameCanvas"></canvas>
  <div class="game-overlay" id="startOverlay">
    <div class="overlay-emoji">🪖</div>
    <div class="overlay-title overlay-grad">TANK BATTLE</div>
    <div class="overlay-sub">Destroy enemy tanks, use cover wisely!</div>
    <button class="overlay-btn" id="startBtn">▶ START GAME</button>
    <div class="overlay-hint">WASD Move · Mouse Aim · Click Shoot</div>
  </div>
  <div class="game-overlay hidden" id="pauseOverlay">
    <div class="overlay-title" style="color:#f59e0b">⏸ PAUSED</div>
    <button class="overlay-btn" id="resumeBtn">▶ Resume</button>
  </div>
  <div class="game-overlay hidden" id="gameOverOverlay">
    <div style="font-size:64px">💥</div>
    <div class="overlay-title" style="color:#ef4444">DESTROYED!</div>
    <div class="overlay-score" id="finalScore">Score: 0</div>
    <div id="finalWave" style="font-size:14px;color:var(--text2)">Wave: 1</div>
    <button class="overlay-btn" id="retryBtn">↺ Try Again</button>
    <a href="../../index.html" class="overlay-link">Return to NEXUS</a>
  </div>
</div>
<div class="controls-help">
  <div class="ctrl-hint"><span class="key">WASD</span> Move</div>
  <div class="ctrl-hint"><span class="key">Mouse</span> Aim</div>
  <div class="ctrl-hint"><span class="key">Click</span> Shoot</div>
  <div class="ctrl-hint"><span class="key">P</span> Pause</div>
</div>
<script src="game.js"></script>
</body>
</html>
