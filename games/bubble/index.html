<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Bubble Blast — NEXUS</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/game.css">
  <style>:root{--grad:linear-gradient(135deg,#3b82f6,#ec4899);--bord:rgba(59,130,246,.2);--accent:#3b82f6;}
  #gameCanvas{cursor:crosshair;}</style>
</head>
<body>
<div id="loading-screen"><div class="load-logo">NEXUS</div><div class="load-title">🫧 BUBBLE BLAST</div><div class="load-bar-wrap"><div class="load-bar" id="load-bar"></div></div><div class="load-hint">Arranging bubbles...</div></div>
<div class="top-bar">
  <a href="../../index.html" class="back-btn">← Back to NEXUS</a>
  <div class="game-title-bar"><span class="game-emoji-sm">🫧</span><span class="game-name">BUBBLE BLAST</span></div>
  <div class="ctrl-btns"><button class="ctrl-btn" id="restartBtn">↺ Restart</button></div>
</div>
<div class="hud">
  <div class="hud-item">🏆 Score <span class="hud-val" id="scoreDisplay">0</span></div>
  <div class="hud-item">💣 Bubbles <span class="hud-val" id="bubblesDisplay">0</span></div>
  <div class="hud-item" style="margin-left:auto">Best <span class="hud-val" id="bestDisplay">0</span></div>
</div>
<div class="game-area" style="background:#050508;">
  <canvas id="gameCanvas"></canvas>
  <div class="game-overlay" id="startOverlay">
    <div class="overlay-emoji">🫧</div>
    <div class="overlay-title overlay-grad">BUBBLE BLAST</div>
    <div class="overlay-sub">Match 3+ bubbles of the same color to pop them!</div>
    <button class="overlay-btn" id="startBtn">▶ START GAME</button>
    <div class="overlay-hint">Click / Aim to shoot bubbles · Match 3 to pop!</div>
  </div>
  <div class="game-overlay hidden" id="gameOverOverlay">
    <div style="font-size:64px">🫧</div>
    <div class="overlay-title" style="color:#ef4444">GAME OVER</div>
    <div class="overlay-score" id="finalScore">Score: 0</div>
    <button class="overlay-btn" id="retryBtn">↺ Try Again</button>
    <a href="../../index.html" class="overlay-link">Return to NEXUS</a>
  </div>
</div>
<div class="controls-help">
  <div class="ctrl-hint"><span class="key">Mouse</span> Aim & shoot</div>
  <div class="ctrl-hint"><span class="key">Match 3+</span> to pop</div>
</div>
<script src="game.js"></script>
</body>
</html>
