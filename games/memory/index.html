<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>Memory Matrix — NEXUS</title>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/game.css">
  <style>:root{--grad:linear-gradient(135deg,#a855f7,#3b82f6);--bord:rgba(168,85,247,.2);--accent:#a855f7;}
  #gameCanvas{cursor:pointer;}</style>
</head>
<body>
<div id="loading-screen"><div class="load-logo">NEXUS</div><div class="load-title">🧠 MEMORY MATRIX</div><div class="load-bar-wrap"><div class="load-bar" id="load-bar"></div></div><div class="load-hint">Loading patterns...</div></div>
<div class="top-bar">
  <a href="../../index.html" class="back-btn">← Back to NEXUS</a>
  <div class="game-title-bar"><span class="game-emoji-sm">🧠</span><span class="game-name">MEMORY MATRIX</span></div>
  <div class="ctrl-btns"><button class="ctrl-btn" id="restartBtn">↺ Restart</button></div>
</div>
<div class="hud">
  <div class="hud-item">🏆 Score <span class="hud-val" id="scoreDisplay">0</span></div>
  <div class="hud-item">🌊 Level <span class="hud-val" id="levelDisplay">1</span></div>
  <div class="hud-item">💭 Status <span class="hud-val" id="statusDisplay">Watch!</span></div>
  <div class="hud-item" style="margin-left:auto">Best <span class="hud-val" id="bestDisplay">0</span></div>
</div>
<div class="game-area" style="background:#050508;">
  <canvas id="gameCanvas"></canvas>
  <div class="game-overlay" id="startOverlay">
    <div class="overlay-emoji">🧠</div>
    <div class="overlay-title overlay-grad">MEMORY MATRIX</div>
    <div class="overlay-sub">Watch the pattern, then repeat it!</div>
    <button class="overlay-btn" id="startBtn">▶ START GAME</button>
    <div class="overlay-hint">Click cells in the same order shown</div>
  </div>
  <div class="game-overlay hidden" id="gameOverOverlay">
    <div style="font-size:64px">🧠</div>
    <div class="overlay-title" style="color:#ef4444">WRONG!</div>
    <div class="overlay-score" id="finalScore">Score: 0</div>
    <div id="finalLevel" style="font-size:14px;color:var(--text2)">Level: 1</div>
    <button class="overlay-btn" id="retryBtn">↺ Try Again</button>
    <a href="../../index.html" class="overlay-link">Return to NEXUS</a>
  </div>
</div>
<div class="controls-help">
  <div class="ctrl-hint"><span class="key">Watch</span> the pattern</div>
  <div class="ctrl-hint"><span class="key">Click</span> cells to repeat</div>
</div>
<script src="game.js"></script>
</body>
</html>
